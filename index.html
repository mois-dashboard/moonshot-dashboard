<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taboola UA Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F8F7F4; color: #1a1a1a; font-size: 14px; line-height: 1.6; }
.page { max-width: 1080px; margin: 0 auto; padding: 2rem 1.5rem; }

/* client switcher */
.client-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid #ddd; flex-wrap: wrap; }
.client-bar-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-right: 4px; }
.client-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 20px; border: 0.5px solid #ddd; background: #fff; color: #888; cursor: pointer; }
.client-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.client-btn:hover:not(.active) { border-color: #aaa; color: #555; }

/* header */
.client-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
.client-header h1 { font-size: 22px; font-weight: 500; margin-bottom: 3px; }
.client-header p { font-size: 13px; color: #888; }
.badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: #E1F5EE; color: #085041; white-space: nowrap; }

/* tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 0.5px solid #e5e5e5; }
.tab { font-size: 13px; font-weight: 500; padding: 8px 16px; border: none; background: none; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #1a1a1a; border-bottom-color: #1D9E75; }
.tab:hover:not(.active) { color: #555; }
.panel { display: none; }
.panel.active { display: block; }

/* metrics */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 10px; padding: 13px; }
.metric-label { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #999; margin-bottom: 4px; }
.metric-value { font-size: 19px; font-weight: 500; color: #1a1a1a; line-height: 1.2; }

/* kpi highlight */
.kpi-highlight { background: #1a1a1a; border-color: #1a1a1a; }
.kpi-highlight .metric-label { color: #888; }
.kpi-highlight .metric-value { color: #fff; }

/* cards */
.card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; }
.card-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 14px; }
.chart-wrap { position: relative; height: 200px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
.prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.prod-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; }
.prod-name { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.prod-os-row { display: flex; gap: 6px; margin-bottom: 12px; }
.os-pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.pill-android { background: #E1F5EE; color: #085041; }
.pill-ios { background: #E6F1FB; color: #0C447C; }
.prod-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat { background: #F8F7F4; border-radius: 6px; padding: 8px 10px; }
.stat-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.stat-value { font-size: 14px; font-weight: 500; color: #1a1a1a; }

/* tables */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
th { text-align: left; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: #999; padding: 0 8px 8px 0; border-bottom: 0.5px solid #e5e5e5; white-space: nowrap; }
td { padding: 9px 8px 9px 0; border-bottom: 0.5px solid #f2f2f2; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.pill { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; }
.p-baba, .pill-baba         { background: #EEEDFE; color: #3C3489; }
.p-cc, .pill-cc             { background: #E6F1FB; color: #0C447C; }
.p-spree, .pill-spree       { background: #E1F5EE; color: #085041; }
.pill-playstar               { background: #FCEEE8; color: #8B3A1E; }
.pill-lonestar               { background: #FDF6DF; color: #7A5C00; }
.p-andr                      { background: #EAF3DE; color: #27500A; }
.p-ios                       { background: #FAEEDA; color: #633806; }
.p-desktop                   { background: #F0F0F0; color: #555; }
.camp-name { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: #555; }
.nil { color: #ccc; }
.footer { font-size: 11px; color: #bbb; text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid #eee; }
@media (max-width: 640px) { .two-col, .prod-grid { grid-template-columns: 1fr; } }
@media print { body{background:#fff;} .tabs,.client-bar{display:none;} .panel{display:block!important;} }

/* filter bar */
.filter-bar { display:flex; align-items:center; gap:16px; margin-bottom:1.5rem; padding:10px 14px; background:#1a1a1a; border-radius:10px; flex-wrap:wrap; }
.filter-bar-section { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.filter-bar-label { font-size:10px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#666; white-space:nowrap; }
.filter-date-input { background:#2a2a2a; border:0.5px solid #444; color:#ddd; border-radius:6px; padding:5px 9px; font-size:12px; font-family:inherit; outline:none; cursor:pointer; color-scheme:dark; }
.filter-date-input:focus { border-color:#1D9E75; }
.filter-sep { color:#555; font-size:12px; }
.filter-pill { font-size:11px; font-weight:500; padding:4px 12px; border-radius:20px; border:1.5px solid; background:transparent; cursor:pointer; opacity:0.38; transition:opacity 0.15s, background 0.15s, color 0.15s; }
.filter-pill.on { background:var(--pill-color, #888); color:#fff !important; opacity:1; }
.filter-pill:hover:not(.on) { opacity:0.65; }
.conv-chart-note { font-size:11px; color:#aaa; margin-top:6px; min-height:14px; font-style:italic; }

/* password overlay */
#pw-overlay { position:fixed; inset:0; background:#1a1a1a; display:flex; align-items:center; justify-content:center; z-index:9999; }
#pw-overlay.hidden { display:none; }
#pw-card { background:#242424; border:0.5px solid #333; border-radius:14px; padding:2.5rem 2rem; width:100%; max-width:340px; text-align:center; }
#pw-card h2 { font-size:16px; font-weight:500; color:#fff; margin-bottom:4px; }
#pw-card p { font-size:12px; color:#666; margin-bottom:1.5rem; }
#pw-input { width:100%; padding:10px 14px; border-radius:8px; border:0.5px solid #444; background:#1a1a1a; color:#fff; font-size:14px; outline:none; margin-bottom:10px; }
#pw-input:focus { border-color:#1D9E75; }
#pw-submit { width:100%; padding:10px; border-radius:8px; border:none; background:#1D9E75; color:#fff; font-size:14px; font-weight:500; cursor:pointer; }
#pw-submit:hover { background:#179060; }
#pw-error { font-size:12px; color:#e05252; margin-top:8px; min-height:16px; }
</style>
</head>
<body>

<!-- PASSWORD OVERLAY -->
<div id="pw-overlay">
  <div id="pw-card">
    <h2>Moonshot Dashboard</h2>
    <p>Enter password to continue</p>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password"/>
    <button id="pw-submit">Unlock</button>
    <div id="pw-error"></div>
  </div>
</div>
<script>
(function(){
  var overlay = document.getElementById("pw-overlay");
  var input   = document.getElementById("pw-input");
  var errEl   = document.getElementById("pw-error");
  if (sessionStorage.getItem("ms_auth") === "1") { overlay.classList.add("hidden"); return; }
  function attempt() {
    if (input.value === "Moonshot2026") {
      sessionStorage.setItem("ms_auth","1");
      overlay.classList.add("hidden");
    } else {
      errEl.textContent = "Incorrect password";
      input.value = "";
      input.focus();
      setTimeout(function(){ errEl.textContent = ""; }, 2500);
    }
  }
  document.getElementById("pw-submit").addEventListener("click", attempt);
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
  input.focus();
})();
</script>

<div class="page">

<!-- CLIENT SWITCHER -->
<div class="client-bar">
  <span class="client-bar-label">Client</span>
  <div id="client-buttons"></div>
</div>

<!-- HEADER -->
<div class="client-header">

    <h1 id="hdr-name"></h1>

  </div>

</div>

<script src="data.js"></script>
<script>
/* =====================================================================
   RENDERING ENGINE — never needs editing
   ===================================================================== */
var fc = function(v){ return "$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); };
var fn = function(v){ return Math.round(v).toLocaleString("en-US"); };
var fp = function(v){ return v.toFixed(2)+"%"; };
var calcCTR = function(c,i){ return i>0 ? c/i*100 : 0; };
var calcCPC = function(s,c){ return c>0 ? s/c : 0; };
var osPillClass = { Android:"p-andr", iOS:"p-ios", Desktop:"p-desktop" };

var currentClientIdx = 0;
var charts = {};

/* =====================================================================
   FILTER STATE & HELPERS
   ===================================================================== */
var filterState = { cl: null, startIdx: 0, endIdx: 0, activeProds: [], year: "2026" };

var MONTH_IDX = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};

function labelToYMD(label, year) {
  var p = label.split(" ");
  var m = MONTH_IDX[p[0]]; var d = parseInt(p[1], 10);
  return year + "-" + (m<10?"0":"")+m + "-" + (d<10?"0":"")+d;
}
function ymdToDate(ymd) {
  var p = ymd.split("-");
  return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
}
function extractYear(period) { var m = period.match(/(\d{4})/); return m ? m[1] : "2026"; }

function initFilterBar(cl) {
  filterState.cl = cl;
  filterState.year = extractYear(cl.period);
  filterState.startIdx = 0;
  filterState.endIdx = cl.labels.length - 1;
  filterState.activeProds = cl.products.slice();
  document.getElementById("filter-start").value = labelToYMD(cl.labels[0], filterState.year);
  document.getElementById("filter-end").value   = labelToYMD(cl.labels[cl.labels.length-1], filterState.year);
  var container = document.getElementById("prod-pill-filter");
  container.innerHTML = "";
  cl.products.forEach(function(prod) {
    var color = cl.productColors[prod];
    var btn = document.createElement("button");
    btn.className = "filter-pill on";
    btn.textContent = prod;
    btn.setAttribute("data-prod", prod);
    btn.style.borderColor = color;
    btn.style.color = color;
    btn.style.setProperty("--pill-color", color);
    btn.onclick = function() { toggleProdFilter(prod); };
    container.appendChild(btn);
  });
}

function toggleProdFilter(prod) {
  var idx = filterState.activeProds.indexOf(prod);
  if (idx >= 0) filterState.activeProds.splice(idx, 1);
  else filterState.activeProds.push(prod);
  document.querySelectorAll(".filter-pill").forEach(function(btn) {
    var p = btn.getAttribute("data-prod");
    var on = filterState.activeProds.indexOf(p) >= 0;
    btn.classList.toggle("on", on);
    if (on) { btn.style.background = btn.style.getPropertyValue("--pill-color") || filterState.cl.productColors[p]; btn.style.color = "#fff"; }
    else     { btn.style.background = "transparent"; btn.style.color = btn.style.borderColor; }
  });
  applyFilters();
}

function onDateFilterChange() {
  var cl = filterState.cl; if (!cl) return;
  var sv = document.getElementById("filter-start").value;
  var ev = document.getElementById("filter-end").value;
  if (!sv || !ev) return;
  var sd = ymdToDate(sv), ed = ymdToDate(ev);
  var year = filterState.year;
  var si = 0, ei = cl.labels.length - 1, firstFound = false;
  cl.labels.forEach(function(lbl, i) {
    var d = ymdToDate(labelToYMD(lbl, year));
    if (!firstFound && d >= sd) { si = i; firstFound = true; }
    if (d <= ed) ei = i;
  });
  if (!firstFound) si = 0;
  if (si > ei) si = ei;
  filterState.startIdx = si; filterState.endIdx = ei;
  applyFilters();
}

function applyFilters() {
  var cl = filterState.cl; if (!cl) return;
  var si = filterState.startIdx, ei = filterState.endIdx, ap = filterState.activeProds;
  var slicedLabels = cl.labels.slice(si, ei + 1);
  var slicedDT     = cl.dayTotals.slice(si, ei + 1);

  /* subtitle */
  var yr = filterState.year;
  document.getElementById("hdr-date").textContent =
    slicedLabels[0] + " \u2013 " + slicedLabels[slicedLabels.length-1] + ", " + yr + " \u00b7 Ad ID level";

  /* totals */
  var kpi = cl.kpiConv;
  var tot = { spent:0, clicks:0, impressions:0 };
  cl.convDefs.forEach(function(cd){ tot[cd.key] = 0; });
  if (ap.length === cl.products.length) {
    slicedDT.forEach(function(d){ tot.spent+=d.spent; tot.clicks+=d.clicks; tot.impressions+=d.impressions; cl.convDefs.forEach(function(cd){ tot[cd.key]+=(d[cd.key]||0); }); });
  } else {
    ap.forEach(function(prod){ var pd=cl.prodDaily[prod]||[]; for(var i=si;i<=ei;i++) tot.spent+=((pd[i]&&pd[i].spent)||0); });
    cl.prodOS.forEach(function(r){ if(ap.indexOf(r.product)>=0){ tot.clicks+=r.clicks; tot.impressions+=r.impressions; cl.convDefs.forEach(function(cd){ tot[cd.key]+=(r[cd.key]||0); }); } });
  }

  /* KPI metrics */
  var mg = document.getElementById("overview-metrics"); mg.innerHTML = "";
  var kpiVal = tot[kpi]>0 ? fc(tot.spent/tot[kpi]) : "";
  var mds = [["Spend",fc(tot.spent),false],["Impressions",fn(tot.impressions),false],["Clicks",fn(tot.clicks),false],
             ["CTR",fp(calcCTR(tot.clicks,tot.impressions)),false],["CPC",fc(calcCPC(tot.spent,tot.clicks)),false]];
  cl.convDefs.forEach(function(cd){ mds.push([cd.label,fn(tot[cd.key]),false]); });
  mds.push(["CPA ("+cl.kpiLabel+")", kpiVal, true]);
  mds.forEach(function(d){ var el=document.createElement("div"); el.className="metric"+(d[2]?" kpi-highlight":"");
    el.innerHTML="<div class=\"metric-label\">"+d[0]+"</div><div class=\"metric-value\">"+d[1]+"</div>"; mg.appendChild(el); });

  /* spendChart */
  var spendData;
  if (ap.length === cl.products.length) { spendData = slicedDT.map(function(d){ return d.spent; }); }
  else { spendData = []; for(var i=si;i<=ei;i++){ var ds=0; ap.forEach(function(prod){ var _d=cl.prodDaily[prod]; ds+=(_d&&_d[i]?_d[i].spent:0); }); spendData.push(ds); } }
  if (charts["spendChart"]) { charts["spendChart"].data.labels=slicedLabels; charts["spendChart"].data.datasets[0].data=spendData; charts["spendChart"].update(); }

  /* prodSpendChart */
  if (charts["prodSpendChart"]) {
    charts["prodSpendChart"].data.labels = slicedLabels;
    cl.products.forEach(function(prod, i){ charts["prodSpendChart"].data.datasets[i].data=(cl.prodDaily[prod]||[]).slice(si,ei+1).map(function(d){ return d.spent; }); charts["prodSpendChart"].data.datasets[i].hidden=ap.indexOf(prod)<0; });
    charts["prodSpendChart"].update();
  }

  /* convChart */
  if (charts["convChart"]) {
    charts["convChart"].data.labels = slicedLabels;
    var noteEl = document.getElementById("conv-chart-note");
    var last7Start = cl.labels.length - 7;
    if (ap.length === cl.products.length) {
      /* All products: dayTotals is exact */
      cl.convDefs.forEach(function(cd, i) {
        charts["convChart"].data.datasets[i].data = slicedDT.map(function(d){ return d[cd.key]; });
      });
      if (noteEl) noteEl.textContent = "";
    } else if (cl.prodLast7Daily && si >= last7Start) {
      /* Product subset, range entirely within last 7 days: use actual per-product data */
      var l7off = si - last7Start;
      cl.convDefs.forEach(function(cd, i) {
        var convData = [];
        for (var j = 0; j <= ei - si; j++) {
          var v = 0;
          ap.forEach(function(prod) {
            var rows = cl.prodLast7Daily[prod];
            if (rows && rows[l7off + j]) v += (rows[l7off + j][cd.key] || 0);
          });
          convData.push(v);
        }
        charts["convChart"].data.datasets[i].data = convData;
      });
      if (noteEl) noteEl.textContent = "";
    } else {
      /* Product subset, range beyond last 7 days: fall back to dayTotals, show warning */
      cl.convDefs.forEach(function(cd, i) {
        charts["convChart"].data.datasets[i].data = slicedDT.map(function(d){ return d[cd.key]; });
      });
      if (noteEl) noteEl.textContent = "Conversion breakdown by product not available for this date range";
    }
    charts["convChart"].update();
  }

  /* osChart */
  if (charts["osChart"]) {
    var osS={}; cl.prodOS.forEach(function(r){ if(ap.indexOf(r.product)>=0) osS[r.os]=(osS[r.os]||0)+r.spent; });
    var osK=Object.keys(osS); var osV=osK.map(function(k){ return osS[k]; }); var osBg=["#1D9E75","#378ADD","#7F77DD","#EF9F27"];
    charts["osChart"].data.labels=osK; charts["osChart"].data.datasets[0].data=osV; charts["osChart"].data.datasets[0].backgroundColor=osBg.slice(0,osK.length); charts["osChart"].update();
  }

  /* product cards */
  document.querySelectorAll(".prod-card[data-product]").forEach(function(card){ card.style.display=ap.indexOf(card.getAttribute("data-product"))>=0?"":"none"; });

  /* campaign rows */
  document.querySelectorAll("#camp-body tr[data-product]").forEach(function(row){ row.style.display=ap.indexOf(row.getAttribute("data-product"))>=0?"":"none"; });

  /* top ads sections */
  document.querySelectorAll("#topads-container .card[data-product]").forEach(function(sec){ sec.style.display=ap.indexOf(sec.getAttribute("data-product"))>=0?"":"none"; });
}

function switchTab(id, btn) {
  document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("panel-"+id).classList.add("active");
  btn.classList.add("active");
}

function switchClient(idx) {
  currentClientIdx = idx;
  document.querySelectorAll(".client-btn").forEach(function(b,i){
    b.classList.toggle("active", i===idx);
  });
  /* reset to overview tab */
  document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("panel-overview").classList.add("active");
  document.querySelectorAll(".tab")[0].classList.add("active");
  renderClient(CLIENTS[idx]);
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function renderClient(cl) {
  var t = cl.totals;
  var kpi = cl.kpiConv;

  /* header */
  document.getElementById("hdr-name").textContent = cl.name;
  document.getElementById("hdr-date").textContent = cl.period + " \u00b7 Ad ID level";
  document.getElementById("footer-text").textContent = "Generated by Cowork \u00b7 Taboola UA \u00b7 " + cl.name + " \u00b7 " + cl.period;

  /* overview metrics */
  var mg = document.getElementById("overview-metrics");
  mg.innerHTML = "";
  var kpiVal = t[kpi] > 0 ? fc(t.spent/t[kpi]) : "";
  var metricDefs = [
    ["Spend",       fc(t.spent),  false],
    ["Impressions", fn(t.impressions),   false],
    ["Clicks",      fn(t.clicks), false],
    ["CTR",         fp(calcCTR(t.clicks,t.impressions)), false],
    ["CPC",         fc(calcCPC(t.spent,t.clicks)), false]
  ];
  cl.convDefs.forEach(function(cd){
    metricDefs.push([cd.label, fn(t[cd.key]), false]);
  });
  metricDefs.push(["CPA ("+cl.kpiLabel+")", kpiVal, true]);
  metricDefs.forEach(function(d){
    var el = document.createElement("div");
    el.className = "metric" + (d[2] ? " kpi-highlight" : "");
    el.innerHTML = "<div class=\"metric-label\">"+d[0]+"</div><div class=\"metric-value\">"+d[1]+"</div>";
    mg.appendChild(el);
  });

  /* conv chart title */
  document.getElementById("conv-chart-title").textContent = "Daily " + cl.convDefs.map(function(c){return c.label.toLowerCase();}).join(", ");

  /* product cards */
  var pt = {};
  cl.prodOS.forEach(function(r){
    if(!pt[r.product]) pt[r.product]={spent:0,clicks:0,impressions:0,oses:[]};
    cl.convDefs.forEach(function(cd){ if(!pt[r.product][cd.key]) pt[r.product][cd.key]=0; pt[r.product][cd.key]+=r[cd.key]; });
    pt[r.product].spent+=r.spent; pt[r.product].clicks+=r.clicks; pt[r.product].impressions+=r.impressions;
    pt[r.product].oses.push(r.os);
  });
  var pc = document.getElementById("prod-cards");
  pc.innerHTML = "";
  cl.products.forEach(function(prod){
    var p = pt[prod]; if(!p) return;
    var osSet=[];
    p.oses.forEach(function(o){ if(osSet.indexOf(o)<0) osSet.push(o); });
    var pills = osSet.map(function(o){
      return "<span class=\"os-pill "+(o==="iOS"?"pill-ios":"pill-android")+"\">"+o+"</span>";
    }).join("");
    var cpas = p[kpi]>0 ? fc(p.spent/p[kpi]) : "\u2014";
    var statsHtml =
      "<div class=\"stat\"><div class=\"stat-label\">Spend</div><div class=\"stat-value\">"+fc(p.spent)+"</div></div>"+
      "<div class=\"stat\"><div class=\"stat-label\">Clicks</div><div class=\"stat-value\">"+fn(p.clicks)+"</div></div>"+
      "<div class=\"stat\"><div class=\"stat-label\">CTR</div><div class=\"stat-value\">"+fp(calcCTR(p.clicks,p.impressions))+"</div></div>"+
      "<div class=\"stat\"><div class=\"stat-label\">CPC</div><div class=\"stat-value\">"+fc(calcCPC(p.spent,p.clicks))+"</div></div>";
    cl.convDefs.forEach(function(cd){
      statsHtml += "<div class=\"stat\"><div class=\"stat-label\">"+cd.label+"</div><div class=\"stat-value\">"+fn(p[cd.key]||0)+"</div></div>";
    });
    statsHtml += "<div class=\"stat\"><div class=\"stat-label\">CPA ("+cl.kpiLabel+")</div><div class=\"stat-value\">"+cpas+"</div></div>";
    pc.innerHTML += "<div class=\"prod-card\" data-product=\""+prod+"\">"+
      "<div class=\"prod-name\" style=\"color:"+cl.productColors[prod]+"\">"+prod+"</div>"+
      "<div class=\"prod-os-row\">"+pills+"</div>"+
      "<div class=\"prod-stats\">"+statsHtml+"</div></div>";
  });

  /* last 7 days by product table */
  if (cl.prodLast7) {
    var last7Labels = cl.labels.slice(-7);
    document.getElementById("prod7tbl-title").textContent =
      "Last 7 days (" + last7Labels[0] + " \u2013 " + last7Labels[last7Labels.length-1] + ") \u2014 by product";
    var convHeads7 = cl.convDefs.map(function(cd){
      return "<th class=\"num\">"+cd.label+"</th><th class=\"num\">Cost/"+cd.label+"</th>";
    }).join("");
    document.getElementById("prod7tbl-head").innerHTML =
      "<th>Product</th><th class=\"num\">Spend</th><th class=\"num\">Clicks</th><th class=\"num\">CTR</th><th class=\"num\">CPC</th>" + convHeads7;
    var p7body = document.getElementById("prod7-body");
    p7body.innerHTML = "";
    cl.products.forEach(function(prod){
      var r = Array.isArray(cl.prodLast7)
        ? (function(){ var x=null; cl.prodLast7.forEach(function(row){ if(row.product===prod) x=row; }); return x; })()
        : cl.prodLast7[prod];
      if(!r || r.spent === 0) return;
      var convCells7 = cl.convDefs.map(function(cd){
        var cnt = r[cd.key] || 0;
        var cpa = cnt > 0 ? fc(r.spent/cnt) : "<span class=\"nil\">\u2014</span>";
        return "<td class=\"num\">"+fn(cnt)+"</td><td class=\"num\">"+cpa+"</td>";
      }).join("");
      p7body.innerHTML += "<tr>"+
        "<td><span class=\"pill "+(cl.productPills[prod]||"")+"\">"+prod+"</span></td>"+
        "<td class=\"num\">"+fc(r.spent)+"</td>"+
        "<td class=\"num\">"+fn(r.clicks)+"</td>"+
        "<td class=\"num\">"+fp(calcCTR(r.clicks,r.impressions))+"</td>"+
        "<td class=\"num\">"+fc(calcCPC(r.spent,r.clicks))+"</td>"+
        convCells7+"</tr>";
    });
  }

  /* last 7 days daily breakdown — one card per product */
  var pd7c = document.getElementById("prod7daily-container");
  pd7c.innerHTML = "";
  if (cl.prodLast7Daily) {
    var last7Labels = cl.labels.slice(-7);
    cl.products.forEach(function(prod){
      var rows = cl.prodLast7Daily[prod];
      if (!rows) return;
      var totalSpent = rows.reduce(function(s,r){ return s+r.spent; }, 0);
      if (totalSpent === 0) return;
      var convHeadsD = cl.convDefs.map(function(cd){
        return "<th class=\"num\">"+cd.label+"</th><th class=\"num\">Cost/"+cd.label+"</th>";
      }).join("");
      var rowsHtml = rows.map(function(r, i){
        var convCellsD = cl.convDefs.map(function(cd){
          var cnt = r[cd.key] || 0;
          var cpa = cnt > 0 ? fc(r.spent/cnt) : "<span class=\"nil\">\u2014</span>";
          return "<td class=\"num\">"+fn(cnt)+"</td><td class=\"num\">"+cpa+"</td>";
        }).join("");
        return "<tr>"+
          "<td style=\"font-size:11px;color:#555;\">"+last7Labels[i]+"</td>"+
          "<td class=\"num\">"+fc(r.spent)+"</td>"+
          "<td class=\"num\">"+fn(r.clicks)+"</td>"+
          "<td class=\"num\">"+fp(calcCTR(r.clicks,r.impressions))+"</td>"+
          "<td class=\"num\">"+fc(calcCPC(r.spent,r.clicks))+"</td>"+
          convCellsD+"</tr>";
      }).join("");
      pd7c.innerHTML += "<div class=\"card\" style=\"margin-bottom:1.25rem;\">"+
        "<div class=\"card-title\" style=\"color:"+cl.productColors[prod]+"\">"+prod+" \u2014 last 7 days daily</div>"+
        "<div class=\"tbl-wrap\"><table><thead><tr>"+
        "<th>Date</th>"+
        "<th class=\"num\">Spend</th><th class=\"num\">Clicks</th><th class=\"num\">CTR</th><th class=\"num\">CPC</th>"+
        convHeadsD+
        "</tr></thead><tbody>"+rowsHtml+"</tbody></table></div></div>";
    });
  }

  /* dynamic table headers */
  var convHeads = cl.convDefs.map(function(cd){ return "<th class=\"num\">"+cd.label+"</th>"; }).join("");
  var baseHeads = "<th>Product</th><th>OS</th><th class=\"num\">Spend</th><th class=\"num\">Clicks</th><th class=\"num\">CTR</th><th class=\"num\">CPC</th>";
  document.getElementById("prodostbl-head").innerHTML = baseHeads + convHeads + "<th class=\"num\">CPA ("+cl.kpiLabel+")</th>";
  document.getElementById("camptbl-head").innerHTML = "<th>Campaign</th>" + baseHeads + convHeads + "<th class=\"num\">CPA ("+cl.kpiLabel+")</th>";

  /* product x OS table */
  var pb = document.getElementById("prod-os-body");
  pb.innerHTML = "";
  cl.prodOS.forEach(function(r){
    var cpas = r[kpi]>0 ? fc(r.spent/r[kpi]) : "<span class=\"nil\">\u2014</span>";
    var convCells = cl.convDefs.map(function(cd){ return "<td class=\"num\">"+fn(r[cd.key]||0)+"</td>"; }).join("");
    pb.innerHTML += "<tr>"+
      "<td><span class=\"pill "+cl.productPills[r.product]+"\">"+r.product+"</span></td>"+
      "<td><span class=\"pill "+osPillClass[r.os]+"\">"+r.os+"</span></td>"+
      "<td class=\"num\">"+fc(r.spent)+"</td>"+
      "<td class=\"num\">"+fn(r.clicks)+"</td>"+
      "<td class=\"num\">"+fp(calcCTR(r.clicks,r.impressions))+"</td>"+
      "<td class=\"num\">"+fc(calcCPC(r.spent,r.clicks))+"</td>"+
      convCells+
      "<td class=\"num\">"+cpas+"</td></tr>";
  });

  /* campaigns table */
  var cb = document.getElementById("camp-body");
  cb.innerHTML = "";
  cl.campaigns.forEach(function(r){
    var cpas = r[kpi]>0 ? fc(r.spent/r[kpi]) : "<span class=\"nil\">\u2014</span>";
    var convCells = cl.convDefs.map(function(cd){ return "<td class=\"num\">"+fn(r[cd.key]||0)+"</td>"; }).join("");
    cb.innerHTML += "<tr data-product=\""+r.product+"\">"+
      "<td><span class=\"camp-name\" title=\""+r.name+"\">"+r.name+"</span></td>"+
      "<td><span class=\"pill "+cl.productPills[r.product]+"\">"+r.product+"</span></td>"+
      "<td>"+(r.os?"<span class=\"pill "+osPillClass[r.os]+"\">"+r.os+"</span>":"<span class=\"nil\">\u2014</span>")+"</td>"+
      "<td class=\"num\">"+fc(r.spent)+"</td>"+
      "<td class=\"num\">"+fn(r.clicks)+"</td>"+
      "<td class=\"num\">"+fp(calcCTR(r.clicks,r.impressions))+"</td>"+
      "<td class=\"num\">"+fc(calcCPC(r.spent,r.clicks))+"</td>"+
      convCells+
      "<td class=\"num\">"+cpas+"</td></tr>";
  });

  /* top ads */
  var tac = document.getElementById("topads-container");
  tac.innerHTML = "";
  cl.products.forEach(function(prod){
    if(!cl.topAds[prod]) return;
    var convHeadsAd = cl.convDefs.map(function(cd){ return "<th class=\"num\">"+cd.label+"</th>"; }).join("");
    var rows = cl.topAds[prod].map(function(r){
      var cpas = r[kpi]>0 ? fc(r.spent/r[kpi]) : "<span class=\"nil\">\u2014</span>";
      var convCells = cl.convDefs.map(function(cd){ return "<td class=\"num\">"+fn(r[cd.key]||0)+"</td>"; }).join("");
      var campShort = r.campaign.replace(cl.name+"_Adept_","").replace(cl.name+"_","");
      return "<tr>"+
        "<td style=\"font-family:monospace;font-size:11px;color:#555;\">"+r.id+"</td>"+
        "<td>"+(r.os?"<span class=\"pill "+osPillClass[r.os]+"\">"+r.os+"</span>":"<span class=\"nil\">\u2014</span>")+"</td>"+
        "<td><span class=\"camp-name\" title=\""+r.campaign+"\">"+campShort+"</span></td>"+
        "<td class=\"num\">"+fc(r.spent)+"</td>"+
        "<td class=\"num\">"+fn(r.clicks)+"</td>"+
        "<td class=\"num\">"+fp(calcCTR(r.clicks,r.impressions))+"</td>"+
        "<td class=\"num\">"+fc(calcCPC(r.spent,r.clicks))+"</td>"+
        convCells+
        "<td class=\"num\">"+cpas+"</td></tr>";
    }).join("");
    tac.innerHTML += "<div class=\"card\" data-product=\""+prod+"\" style=\"margin-bottom:1.25rem;\">"+
      "<div class=\"card-title\" style=\"color:"+cl.productColors[prod]+"\">"+prod+" \u2014 top 5 ads by spend</div>"+
      "<div class=\"tbl-wrap\"><table><thead><tr>"+
      "<th>Ad ID</th><th>OS</th><th>Campaign</th>"+
      "<th class=\"num\">Spend</th><th class=\"num\">Clicks</th><th class=\"num\">CTR</th><th class=\"num\">CPC</th>"+
      convHeadsAd+"<th class=\"num\">CPA ("+cl.kpiLabel+")</th>"+
      "</tr></thead><tbody>"+rows+"</tbody></table></div></div>";
  });

  /* charts */
  var gc = "rgba(0,0,0,0.04)";
  var ax = {font:{size:10},color:"#aaa"};
  var convColors = ["#378ADD","#7F77DD","#1D9E75","#EF9F27","#D85A30"];

  destroyChart("spendChart");
  charts["spendChart"] = new Chart(document.getElementById("spendChart"),{
    type:"bar",
    data:{labels:cl.labels,datasets:[{
      data:cl.dayTotals.map(function(d){return d.spent;}),
      backgroundColor:"#1D9E75",borderRadius:4,borderSkipped:false
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{color:gc},ticks:ax},y:{grid:{color:gc},ticks:{font:{size:10},color:"#aaa",callback:function(v){return "$"+v.toLocaleString();}}}}
    }
  });

  destroyChart("prodSpendChart");
  var prodDatasets = cl.products.map(function(prod){
    return {label:prod,data:(cl.prodDaily[prod]||[]).map(function(d){ return d.spent; }),backgroundColor:cl.productChartColors[prod],borderRadius:3,borderSkipped:false,stack:"s"};
  });
  charts["prodSpendChart"] = new Chart(document.getElementById("prodSpendChart"),{
    type:"bar",
    data:{labels:cl.labels,datasets:prodDatasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10},color:"#888",boxWidth:10}}},
      scales:{x:{grid:{color:gc},ticks:ax,stacked:true},y:{grid:{color:gc},ticks:{font:{size:10},color:"#aaa",callback:function(v){return "$"+v.toLocaleString();}},stacked:true}}
    }
  });

  destroyChart("convChart");
  var convDatasets = cl.convDefs.map(function(cd,i){
    return {label:cd.label,data:cl.dayTotals.map(function(d){return d[cd.key];}),
      borderColor:convColors[i%convColors.length],backgroundColor:convColors[i%convColors.length].replace(")",",0.06)").replace("rgb","rgba"),
      borderWidth:2,pointRadius:3,tension:0.35};
  });
  charts["convChart"] = new Chart(document.getElementById("convChart"),{
    type:"line",
    data:{labels:cl.labels,datasets:convDatasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10},color:"#888",boxWidth:10}}},
      scales:{x:{grid:{color:gc},ticks:ax},y:{grid:{color:gc},ticks:ax}}
    }
  });

  destroyChart("osChart");
  var osSpend = {};
  cl.prodOS.forEach(function(r){ osSpend[r.os]=(osSpend[r.os]||0)+r.spent; });
  var osLabels = Object.keys(osSpend);
  var osVals   = osLabels.map(function(k){return osSpend[k];});
  var osBgColors = ["#1D9E75","#378ADD","#7F77DD","#EF9F27"];
  charts["osChart"] = new Chart(document.getElementById("osChart"),{
    type:"doughnut",
    data:{labels:osLabels,datasets:[{data:osVals,backgroundColor:osBgColors.slice(0,osLabels.length),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:"bottom",
        labels:{font:{size:11},color:"#888",boxWidth:12,
          generateLabels:function(chart){
            return chart.data.labels.map(function(l,i){
              var val=chart.data.datasets[0].data[i].toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
              return {text:l+"  $"+val,fillStyle:chart.data.datasets[0].backgroundColor[i],hidden:false,index:i};
            });
          }
        }
      }},
      cutout:"65%"
    }
  });

  initFilterBar(cl);
}

/* Normalize CLIENTS data to match rendering engine expectations.
   Cowork may emit prodOS as a nested dict and topAds as a flat array;
   the rendering engine expects prodOS as a flat array and topAds as a
   per-product dict. Transform once here so no rendering code needs changing. */
CLIENTS.forEach(function(cl) {
  /* prodOS: {product:{os:{spent,clicks,impressions,...}}} → [{product,os,spent,...}] */
  if (cl.prodOS && !Array.isArray(cl.prodOS)) {
    var flat = [];
    Object.keys(cl.prodOS).forEach(function(prod) {
      Object.keys(cl.prodOS[prod]).forEach(function(os) {
        var entry = { product: prod, os: os };
        var src = cl.prodOS[prod][os];
        Object.keys(src).forEach(function(k){ entry[k] = src[k]; });
        flat.push(entry);
      });
    });
    cl.prodOS = flat;
  }
  /* topAds: [{product,...}] → {product:[...]} */
  if (cl.topAds && Array.isArray(cl.topAds)) {
    var byProd = {};
    cl.topAds.forEach(function(r) {
      if (!byProd[r.product]) byProd[r.product] = [];
      byProd[r.product].push(r);
    });
    cl.topAds = byProd;
  }
});

/* build client switcher buttons */
var btnContainer = document.getElementById("client-buttons");
btnContainer.style.display = "flex";
btnContainer.style.gap = "8px";
CLIENTS.forEach(function(cl, i){
  var btn = document.createElement("button");
  btn.className = "client-btn" + (i===0?" active":"");
  btn.textContent = cl.name;
  btn.onclick = (function(idx){ return function(){ switchClient(idx); }; })(i);
  btnContainer.appendChild(btn);
});

/* initial render */
renderClient(CLIENTS[0]);

/* date filter listeners */
document.getElementById("filter-start").addEventListener("change", onDateFilterChange);
document.getElementById("filter-end").addEventListener("change", onDateFilterChange);
